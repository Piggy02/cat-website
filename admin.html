<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Cat Photos</title>
  <script src="js/passgate.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <h1>🐾 Manage Photos</h1>
    <p class="subtitle">Sign in to move photos between cats or delete them</p>
  </header>

  <div class="admin-bar">
    <button id="signInButton" class="sign-in-button">Sign in with Google</button>
  </div>

  <div id="uploadBar" class="upload-bar">
    <select id="uploadCategorySelect" disabled>
      <option value="" selected disabled>Add to…</option>
    </select>
    <input type="file" id="uploadInput" accept="image/*" multiple disabled />
    <button id="uploadButton" disabled>Upload</button>
  </div>

  <nav id="categoryNav" class="category-nav" aria-label="Cat categories"></nav>

  <main>
    <div id="status" class="status"></div>

    <section id="submissionsView" class="gallery-view" hidden>
      <h2 class="gallery-title">New Submissions</h2>
      <div id="submissionsGrid" class="gallery-grid"></div>
    </section>

    <section id="homeView" class="home-grid" hidden></section>

    <section id="galleryView" class="gallery-view" hidden>
      <button id="backButton" class="back-button">&larr; Back to all cats</button>
      <h2 id="galleryTitle" class="gallery-title"></h2>
      <div id="galleryGrid" class="gallery-grid"></div>
    </section>
  </main>

  <div id="lightbox" class="lightbox" hidden>
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-nav lightbox-prev" aria-label="Previous">&#8249;</button>
    <img class="lightbox-img" src="" alt="" />
    <button class="lightbox-nav lightbox-next" aria-label="Next">&#8250;</button>
  </div>

  <div id="bulkBar" class="bulk-bar" hidden>
    <span id="bulkCount" class="bulk-count"></span>
    <select id="bulkMoveSelect" disabled>
      <option value="" selected disabled>Move to…</option>
    </select>
    <button id="bulkMoveButton" disabled>Move</button>
    <button id="bulkDeleteButton" class="delete-button" disabled>Delete</button>
    <button id="bulkClearButton" class="clear-button">Clear selection</button>
  </div>

  <footer class="site-footer">
    <p><a href="index.html">&larr; Back to the gallery</a></p>
  </footer>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="js/config.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
